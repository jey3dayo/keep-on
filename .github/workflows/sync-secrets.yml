name: Sync Secrets to Cloudflare

on:
  workflow_dispatch: # 手動トリガーのみ

jobs:
  sync:
    name: Sync Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      NODE_AUTH_TOKEN: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"

      - name: Generate Secrets JSON
        env:
          DOTENV_PRIVATE_KEY: ${{ secrets.DOTENV_PRIVATE_KEY }}
        run: |
          # dotenvx をインストール
          pnpm add -g @dotenvx/dotenvx

          # Secrets JSON を生成
          ./scripts/generate-secrets-json.sh

      - name: Sync Secrets to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # wrangler secret bulk で一括登録
          pnpm wrangler secret bulk .secrets.json

          echo "✅ Secrets synchronized successfully"

      - name: Cleanup
        if: always()
        run: |
          # .secrets.json を削除（機密情報のため）
          rm -f .secrets.json
          echo "✅ Cleanup completed"

      - name: Verify Secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "📋 Registered Secrets:"
          pnpm wrangler secret list

