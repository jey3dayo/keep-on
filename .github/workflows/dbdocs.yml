name: Deploy Database Documentation

on:
  push:
    branches:
      - main
    paths:
      - "src/db/schema.ts"
      - "docs/database/**"
      - ".github/workflows/dbdocs.yml"
  workflow_dispatch:

jobs:
  deploy-dbdocs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_AUTH_TOKEN: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env

      - name: Generate DBML
        run: pnpm db:docs:generate

      - name: Deploy to dbdocs.io
        env:
          DBDOCS_TOKEN: ${{ secrets.DBDOCS_TOKEN }}
        run: pnpm db:docs:push
